<script>
  // v0.6.1: index.htmlと同じくバッジの©表記の右隣へバージョンを表示する。
  (function () {
    function injectFooterVersion() {
      var badge = document.querySelector(".su-badge");
      if (!badge) return false;
      if (badge.querySelector(".footer-ver")) return true;
      var ver = document.createElement("span");
      ver.className = "footer-ver";
      ver.textContent = "(v" + window.SQLab.APP_VERSION + ")";
      badge.appendChild(ver);
      return true;
    }
    if (!injectFooterVersion()) {
      var tries = 0;
      var timer = setInterval(function () {
        if (injectFooterVersion() || ++tries > 20) clearInterval(timer);
      }, 50);
    }
  })();
</script>
<script src="js/i18n.js?v=0.6.1"></script>
<script>
  (function () {
    // T-zoneのデフォルト値(the Analyzer v0.5.1 確定値)。guide.htmlは特定の
    // result.jsonを読み込まない静的ページのため、tDominanceNoteの
    // {a}/{b}/{offset} プレースホルダはここでデフォルト値により展開する。
    var DEFAULT_T_ZONE = { a: 1.2, b: 1.0, offset: 0.6 };

    function apply(lang) {
      window.SQLab.currentLang = lang;
      document.documentElement.lang = lang;
      window.SQLab.applyStaticI18n(document);
      document.getElementById("lang-toggle").textContent = lang === "ja" ? "JA" : "EN";
      document.querySelector("#t-dominance p").textContent =
        window.SQLab.t("tDominanceNote", DEFAULT_T_ZONE);
    }
    apply(window.SQLab.getLang());
    document.getElementById("lang-toggle").addEventListener("click", function () {
      var next = window.SQLab.currentLang === "ja" ? "en" : "ja";
      window.SQLab.setLang(next);
      apply(next);
    });
  })();
</script>
