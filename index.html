<script src="js/config.js?v=0.6.2"></script>
<script>
  // v0.6.1: バージョン表示は左下バッジの©表記の右隣へ集約する(mnymの
  // injectFooterVersionと同じ手法。ただしtype="module"はfile://でCORS
  // ブロックされるため、plain scriptでwindow.SQLab.APP_VERSIONを直接参照する)。
  // badge.jsはbody内へ同期的に.su-badgeを描画するため通常は初回で成功するが、
  // 将来の非同期化に備えごく短いリトライも残す。
  (function () {
    function injectFooterVersion() {
      var badge = document.querySelector(".su-badge");
      if (!badge) return false;
      if (badge.querySelector(".footer-ver")) return true;
      var ver = document.createElement("span");
      ver.className = "footer-ver";
      ver.textContent = "(v" + window.SQLab.APP_VERSION + ")";
      badge.appendChild(ver);
      return true;
    }
    if (!injectFooterVersion()) {
      var tries = 0;
      var timer = setInterval(function () {
        if (injectFooterVersion() || ++tries > 20) clearInterval(timer);
      }, 50);
    }
  })();
</script>
