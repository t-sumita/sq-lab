<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Squash Laboratory</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="site-header">
  <a class="site-header__brand" href="index.html">
    <span class="site-header__name">Squash Laboratory</span>
    <span class="site-header__version" id="app-version"></span>
  </a>
  <button id="lang-toggle" class="lang-toggle" type="button">EN</button>
</header>

<main id="main">

  <section id="intro-panel" class="panel intro-panel">
    <p class="notice notice--info" data-i18n="dataStaysNotice"></p>

    <div id="drop-zone" class="drop-zone" tabindex="0">
      <p data-i18n="dropPrompt"></p>
      <input type="file" id="file-input" accept="application/json,.json" hidden>
      <button id="choose-file-btn" class="btn" type="button" data-i18n="chooseFile"></button>
    </div>

    <div class="demo-row">
      <button id="demo-btn" class="btn btn--secondary" type="button" data-i18n="demoButton"></button>
    </div>

    <p id="error-box" class="error-box" hidden></p>
  </section>

  <section id="result-panel" class="panel" hidden>
    <div id="match-info" class="match-info"></div>
    <div id="summary-cards" class="summary-cards"></div>
    <div id="heatmap-section" class="heatmap"></div>
    <button id="back-btn" class="btn btn--secondary" type="button" data-i18n="backButton"></button>
  </section>

</main>

<footer class="site-footer">
  <p class="site-footer__tagline" data-i18n="footerText"></p>
  <p class="site-footer__links">
    <span class="site-footer__copyright">&copy; 2026 Subutomo Dev</span>
    <span aria-hidden="true">&middot;</span>
    <a href="https://ko-fi.com/subutomo" target="_blank" rel="noopener" data-i18n="footerKofi"></a>
    <span aria-hidden="true">&middot;</span>
    <a href="https://github.com/t-sumita/sq-lab/issues" target="_blank" rel="noopener" data-i18n="footerFeedback"></a>
  </p>
</footer>

<script src="js/config.js"></script>
<script src="js/i18n.js"></script>
<script src="js/demo-data.js"></script>
<script src="js/playernames.js"></script>
<script src="js/loader.js"></script>
<script src="js/summary.js"></script>
<script src="js/court.js"></script>
<script src="js/heatmap.js"></script>
<script src="js/replay.js"></script>
<script src="js/views.js"></script>
<script src="js/app.js"></script>
</body>
</html>
