<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Squash Laboratory</title>
<link rel="stylesheet" href="css/style.css?v=0.6.0">
</head>
<body>

<div class="sticky-top">
<header class="site-header">
  <a class="site-header__brand" href="index.html">
    <img class="site-header__logo" src="assets/subu-pic-header.png" alt=""
         onerror="this.style.display='none'">
    <span class="site-header__name">Squash Laboratory</span>
    <span class="site-header__version" id="app-version"></span>
  </a>
  <p class="site-header__tagline" data-i18n="headerTagline"></p>
  <div class="site-header__actions">
    <a class="info-icon site-header__info" href="guide.html#overview" aria-label="guide">ⓘ</a>
    <button id="lang-toggle" class="lang-toggle" type="button">EN</button>
  </div>
</header>
</div>

<main id="main">

  <div id="top-notice" class="top-notice">
    <span id="top-notice-text" class="top-notice__text" hidden></span>
    <button id="top-notice-btn" class="btn btn--secondary btn--small" type="button"></button>
  </div>

  <section id="load-panel" class="panel intro-panel" hidden>
    <p class="notice notice--info" data-i18n="dataStaysNotice"></p>
    <div id="drop-zone" class="drop-zone" tabindex="0">
      <p data-i18n="dropPrompt"></p>
      <input type="file" id="file-input" accept="application/json,.json" hidden>
      <button id="choose-file-btn" class="btn" type="button" data-i18n="chooseFile"></button>
    </div>
    <p id="error-box" class="error-box" hidden></p>
  </section>

  <section id="result-panel" class="panel" hidden>
    <div id="match-info" class="match-info card"></div>
    <div id="summary-cards" class="summary-cards"></div>
    <div id="heatmap-section" class="heatmap card"></div>
  </section>

</main>

<div class="footer-right">
  <div class="support-links" aria-label="support links">
    <a href="https://ko-fi.com/subutomo" target="_blank" rel="noopener" data-i18n="footerKofi"></a>
    <span class="support-sep" aria-hidden="true">&middot;</span>
    <a href="https://github.com/sponsors/t-sumita" target="_blank" rel="noopener" data-i18n="footerSponsors"></a>
  </div>
  <a class="feedback-link"
     href="https://docs.google.com/forms/d/e/1FAIpQLSf_thpSe4TfQ_EloElTBsCiMKgypYTKLCs0dSTmaF_FXZSvIg/viewform?usp=pp_url&entry.2036331541=Squash+Laboratory+(sq-lab)"
     target="_blank" rel="noopener noreferrer" data-i18n="footerFeedback"></a>
</div>
<div class="footer-bar" aria-hidden="true"></div>

<script>
  window.SUBUTOMO_BADGE_CONFIG = {
    currentSiteId: 'sq-lab',
    sitesJsonPath: 'config/subutomo-sites.json',
    logoPath: './common/assets/logo.png',
    theme: 'light-bg',
    privacy: { localStorage: true, analytics: false },
    onSecretAction: null
  };
</script>
<script src="./assets/subutomo-badge.js?v=0.6.0"></script>

<script src="js/config.js?v=0.6.0"></script>
<script src="js/i18n.js?v=0.6.0"></script>
<script src="js/demo-data.js?v=0.6.0"></script>
<script src="js/playernames.js?v=0.6.0"></script>
<script src="js/loader.js?v=0.6.0"></script>
<script src="js/summary.js?v=0.6.0"></script>
<script src="js/court.js?v=0.6.0"></script>
<script src="js/heatmap.js?v=0.6.0"></script>
<script src="js/replay.js?v=0.6.0"></script>
<script src="js/views.js?v=0.6.0"></script>
<script src="js/app.js?v=0.6.0"></script>
</body>
</html>
